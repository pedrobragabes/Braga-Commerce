name: Availability monitor

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-availability
  cancel-in-progress: true

jobs:
  health:
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - name: Check application and database
        run: >-
          curl --fail --silent --show-error
          --retry 2 --retry-all-errors --max-time 20
          https://braga-commerce.vercel.app/api/health
