services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: braga_commerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - braga-commerce-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d braga_commerce"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  braga-commerce-postgres:
